  #     url: http://swagger.io
  # - name: user
  #   description: Operations about user
  
  # /jobs:
  # get:
  #   summary: Get all jobs (filterable)
  #   parameters:
  #     - name: status
  #       in: query
  #       schema:
  #         type: string
  #         enum: [pending, in_progress, rejected, completed]
paths:
  /jobs/requests:
    get:
      tags:
        - jobs
      summary: get all the jobs from database (filterable)
      description: Get all jobs from the database
      x-lambda-runtime: python v3.12
      x-lambda-function: getJobsList.py
      x-database: crud-nosql-app-maintenance-requests-table
      operationId: getJobsList
      parameters:
       - name: status
         in: query
         schema:
           type: string
           enum: [pending, in_progress, rejected, completed]
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobResponse'
        '400':
          description: Invalid ID supplied
        '404':
          description: Job not found
        '405':
          description: Validation exception
      security:
        - BearerAuth: []
        
    post:
      tags:
        - jobs
      summary: Create a new job request Set "status ==== pending"
      description: Add a request to the requests database
      x-lambda-runtime: python v3.12
      x-lambda-function: postJobRequest.py
      x-database: crud-nosql-app-maintenance-requests-table
      operationId: addNewJob
      requestBody:
        description: Create a new pet in the store
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobRequest'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'          
        '405':
          description: Invalid input
      security:
        - petstore_auth:
            - write:pets
            - read:pets
  
  /jobs/actioned:
    get:
      tags:
        - jobs
      summary: get all the jobs completed from database (filterable)
      description: Get all jobs from the database
      x-lambda-runtime: python v3.12
      x-lambda-function: getJobsList.py
      x-database: crud-nosql-app-maintenance-requests-table
      operationId: getJobsActionedList
      parameters:
       - name: group
         in: query
         schema:
           type: string
           enum: [technician, contractor]
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobResponse'
        '400':
          description: Invalid ID supplied
        '404':
          description: Job not found
        '405':
          description: Validation exception
      security:
        - BearerAuth: []
            
  /jobs/{jobId}/approve: 
    post:
      tags:
        - jobs
      summary: Approve an job "status === pending --> in progress"
      description: ''
      x-lambda-runtime: python v3.12
      x-lambda-function: postApproveRequest.py
      x-database: crud-nosql-app-maintenance-requests-table
      operationId: postApproveRequest
      requestBody:
        description: Approve an existing pending job
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobApproveRequest'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref:  '#/components/schemas/JobApprovedResponse'
        '405':
          description: Invalid input
      security:
        - petstore_auth:
            - write:pets
            - read:pets
  
  /jobs/{jobId}/reject: 
    post:
      tags:
        - jobs
      summary: Reject a pending job Set "status === pending --> rejected"
      description: ''
      x-lambda-runtime: python v3.12
      x-lambda-function: postRejectRequest.py
      operationId: addRejectJob
      x-database: crud-nosql-app-maintenance-requests-table
      requestBody:
        description: Reject a job request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
          application/xml:
            schema:
              $ref: '#/components/schemas/Pet'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Pet'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'          
            application/xml:
              schema:
                $ref: '#/components/schemas/Pet'
        '405':
          description: Invalid input
      security:
        - petstore_auth:
            - write:pets
            - read:pets
            
  /jobs/{jobId}/action: 
    post:
      tags:
        - jobs
      summary: technician action a job "status === in progess --> complete"
      description: ''
      x-lambda-runtime: python v3.12
      x-lambda-function: postJobAction.py
