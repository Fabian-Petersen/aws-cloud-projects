            type: integer
            format: int64
        - name: status
          in: query
          schema:
           type: string
           enum: [pending, in_progress]
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'          
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid status value
      security:
        - petstore_auth:
            - write:pets
            - read:pets
    delete:
      tags:
        - jobs
      summary: delete an item by id from database (filterable)
      description: Delete the pending job by id
      x-lambda-runtime: python v3.12
      x-lambda-function: deleteJobById.py
      x-database: crud-nosql-app-maintenance-requests-table
      operationId: deleteJobById
      parameters:
        - name: jobId
          in: path
          description: ID of job to be deleted
          required: true
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          schema:
           type: string
           enum: [pending, in_progress]
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'          
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid status value
      security:
        - petstore_auth:
            - write:pets
            - read:pets
            
  /jobs/{jobId}/jobcard:
    get:
      tags:
        - jobs
      summary: Return a jobcard for a single job
      description: Returns a single approved job
      x-lambda-runtime: python v3.12
