          required: true
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          schema:
           type: string
           enum: [pending, in_progress, rejected, completed]

      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
