          type: string
        impact:
          type: string
        jobComments:
          type: string
          default: ""
        description:
          type: string
        area:
          type: string
        assetID:
          type: string
          
    # Presigned Image Url Schema
    JobImage:
      type: object
      properties:
        key:
          type: string
        url:
          type: string
        filename:
          type: string
  
