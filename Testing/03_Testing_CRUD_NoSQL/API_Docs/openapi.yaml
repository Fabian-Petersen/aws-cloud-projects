openapi: 3.0.3
info:
  title: Atlantic Meat API 1.0
  description: |-
    This is a sample Maintenance and Asset Management API based on the OpenAPI 3.0 specification.
    You can find out more about Swagger at [https://swagger.io](https://swagger.io). 
    In this API, we've adopted a design-first approach to make it easier to manage users, projects, and assets.
    You can help improve the API by updating the definition or the implementation. Over time, this will allow us to enhance features and expose new capabilities in OAS3.

    _If you're looking for the Swagger 2.0/OAS 2.0 version of Petstore, then click [here](https://editor.swagger.io/?url=https://petstore.swagger.io/v2/swagger.yaml). Alternatively, you can load via the `Edit > Load Petstore OAS 2.0` menu option!_
    
    Some useful links:
    - [The Pet Store repository](https://github.com/swagger-api/swagger-petstore)
    - [The source API definition for the Pet Store](https://github.com/swagger-api/swagger- - -petstore/blob/master/src/main/resources/openapi.yaml)
  termsOfService: http://swagger.io/terms/
  contact:
    email: apiteam@swagger.io
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
externalDocs:
  description: Find out more about Swagger
  url: http://swagger.io
servers:
  - url: https://petstore3.swagger.io/api/v3
tags:
  - name: Atlantic Meat
    description: Maintenance and Asset Management
    externalDocs:
      description: Find out more
      url: https://crud-nosql.app.fabian-portfolio.net
  # - name: store
    # description: Access to Petstore orders
    # externalDocs:
      # description: Find out more about our store
      # url: http://swagger.io
  # - name: user
    # description: Operations about user
paths:
  /jobs:
    get:
      tags:
        - jobs
      summary: get all the jobs from database
      description: Get all jobs from the database
      x-lambda-runtime: python v3.12
      x-lambda-function: getJobsList.py
      operationId: getJobs
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'          
            application/xml:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid ID supplied
        '404':
          description: Job not found
        '405':
          description: Validation exception
      security:
        - petstore_auth:
            - write:pets
            - read:pets
  /jobs/request:
    post:
      tags:
        - jobs
      summary: Add a new job request to the database
      description: Add a new pet to the store
      x-lambda-runtime: python v3.12
      x-lambda-function: postJobRequest.py
      operationId: addNewJob
      requestBody:
        description: Create a new pet in the store
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
          application/xml:
            schema:
              $ref: '#/components/schemas/Pet'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Pet'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'          
            application/xml:
              schema:
                $ref: '#/components/schemas/Pet'
        '405':
          description: Invalid input
      security:
        - petstore_auth:
            - write:pets
            - read:pets
            
  /jobs/request/approved: 
    post:
      tags:
        - jobs
      summary: Approve an existing pending job
      description: Approve an existing pending job
      x-lambda-runtime: python v3.12
      x-lambda-function: postApproveRequest.py
      operationId: addRequestApproved
      requestBody:
        description: Approve an existing pending job
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
          application/xml:
            schema:
              $ref: '#/components/schemas/Pet'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Pet'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'          
            application/xml:
              schema:
                $ref: '#/components/schemas/Pet'
        '405':
          description: Invalid input
      security:
        - petstore_auth:
            - write:pets
            - read:pets
  
  /jobs/requests/rejected: 
    post:
      tags:
        - jobs
      summary: Reject a pending job
      description: Add a new pet to the store
      x-lambda-runtime: python v3.12
      x-lambda-function: postRejectRequest.py
      operationId: addRejectJob
      requestBody:
        description: Reject a job request
        content:
          application/json:
