            - read:pets
  
  /jobs/pending: 
    get:
      tags:
        - jobs
      summary: Get all the jobs with "status === pending"
      description: Get all the jobs that are pending
      x-lambda-runtime: python v3.12
      x-lambda-function: getJobsPendingList.py
