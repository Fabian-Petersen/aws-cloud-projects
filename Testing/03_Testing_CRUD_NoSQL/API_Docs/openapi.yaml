components:
  schemas:
    User:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        
        group:
          type: string
          description: User role/group
          example: admin
          enum:
            - admin
            - technician
            - contractor
            - manager
            - user
        
        family_name:
          type: string
          description: User surname
          example: "Petersen"

        name:
          type: string
          description: User first name
          example: "Fabian"

        location:
          type: string
          description: User location
          example: "Cape Town"

        mobile:
          type: string
          description: South African mobile number
          example: "0821234567"
          pattern: "^0[6-8][0-9]{8}$"

      required:
        - email
        - group
        - family_name
        - name
        - location
        - mobile

      xml:
        name: user

    UserResponse:
      type: object
      properties:
        id:
          type: string
          example: "33bcf2e8-b091-905d-5372-00c567c43a45"

        email:
          type: string
          format: email
          example: "user@example.com"

        name:
          type: string
          example: "Fabian"

        family_name:
          type: string
          example: "Petersen"

        username:
          type: string
          description: Cognito username
          example: "fabian.petersen"

        email_verified:
          type: boolean
          description: Whether the user's email is verified
          example: true

        status:
          type: string
          description: User account status
          example: CONFIRMED
          enum:
            - UNCONFIRMED
            - CONFIRMED
            - ARCHIVED
            - COMPROMISED
            - UNKNOWN
            - RESET_REQUIRED
            - FORCE_CHANGE_PASSWORD

        group:
          type: string
          description: User role/group
          example: admin
          enum:
            - admin
            - technician
            - contractor
            - manager
            - user

        location:
          type: string
          example: "Cape Town"

        userCreated:
          type: string
          format: date-time
          description: User creation timestamp
          example: "2024-10-01T12:00:00Z"

        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
          example: "2024-10-10T15:30:00Z"

        mobile:
          type: string
          description: South African mobile number
          example: "0821234567"
          pattern: "^0[6-8][0-9]{8}$"

      required:
        - id
        - email
        - name
        - family_name
        - username
        - email_verified
        - status
        - group
        - location
        - userCreated
        - updatedAt
        - mobile

      xml:
        name: userResponse

  securitySchemes:
    petstore_auth:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://petstore3.swagger.io/oauth/authorize
          scopes:
            write:pets: modify pets in your account
            read:pets: read your pets
    api_key:
      type: apiKey
      name: api_key
      in: header