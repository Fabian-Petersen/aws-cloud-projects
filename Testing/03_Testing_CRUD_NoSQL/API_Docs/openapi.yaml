      x-lambda-runtime: python v3.12
      x-lambda-function: getJobsPendingById.py
      operationId: getJobsPendingById
      parameters:
        - name: jobId
          in: path
          description: ID of pet to return
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'          
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid status value
      security:
        - petstore_auth:
            - write:pets
            - read:pets
  
    put:
      tags:
        - jobs
      summary: update a pending job by id with "status === pending"
      description: Update a pending job request
      x-lambda-runtime: python v3.12
      x-lambda-function: updateJobRequestById.py
      operationId: updateJobRequestById
      parameters:
        - name: jobId
          in: path
          description: ID of job to update
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'          
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid status value
      security:
        - petstore_auth:
            - write:pets
            - read:pets
    delete:
      tags:
        - jobs
      summary: delete a single job by id with "status === pending"
      description: Delete the pending job by id
      x-lambda-runtime: python v3.12
      x-lambda-function: deleteJobRequestById.py
      operationId: deleteJobRequestById
      parameters:
        - name: jobId
          in: path
          description: ID of job to be deleted
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'          
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid status value
      security:
        - petstore_auth:
            - write:pets
            - read:pets
            
  /jobs/approved: 
    get:
